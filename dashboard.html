<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ToDo Dashboard</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="css/dashboard.css" rel="stylesheet">
    
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-list-check me-2"></i>ToDo Dashboard</a>
            <div class="ms-auto d-flex align-items-center">
                <div id="greeting" class="me-3"></div>
                <button class="btn btn-primary" id="btnAdd" data-bs-toggle="modal" data-bs-target="#todoModal">
                    <i class="fa-solid fa-plus"></i> Add Todo
                </button>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="row mb-3">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="card-title mb-0">Your Tasks</h5>
                            <small class="text-muted" id="todo-count">0 tasks</small>
                        </div>
                        <div>
                            <div class="btn-group me-2">
                                <button id="filterAll" class="btn btn-outline-secondary btn-sm active">All</button>
                                <button id="filterActive" class="btn btn-outline-secondary btn-sm">Active</button>
                                <button id="filterCompleted" class="btn btn-outline-secondary btn-sm">Completed</button>
                            </div>
                            <select id="sortSelect" class="form-select form-select-sm d-inline-block" style="width:180px;">
                                <option value="createdDesc">Newest</option>
                                <option value="createdAsc">Oldest</option>
                                <option value="dueAsc">Due Soon</option>
                                <option value="priorityDesc">Priority</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

           <div class="col-md-4 d-flex justify-content-end align-items-center">
  <div class="welcome-box d-flex align-items-center px-3 py-2 rounded-3 shadow-sm bg-light">
    <div class="me-2">
      <i class="fa fa-user-circle text-primary" style="font-size: 1.6rem;"></i>
    </div>
    <div>
      <small class="text-muted">Welcome back,</small><br>
      <strong id="username" class="text-dark">User</strong>
    </div>
  </div>
</div>


        </div>

        <div id="todosList" class="row g-3">
            <!-- todo cards inserted here -->
        </div>
    </main>

    <!-- Todo Modal (Add / Edit) -->
    <div class="modal fade" id="todoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <form id="todoForm" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Todo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="todoId" />
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input id="title" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col">
                            <label class="form-label">Priority</label>
                            <select id="priority" class="form-select">
                                <option>HIGH</option>
                                <option selected>MEDIUM</option>
                                <option>LOW</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label">Due Date</label>
                            <input id="dueDate" type="date" class="form-control" />
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label">Category</label>
                        <input id="category" class="form-control" placeholder="Work, Personal, etc."/>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save me-1"></i> Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body">
                    <p class="mb-0"><i class="fa-solid fa-triangle-exclamation text-warning me-2"></i>Are you sure you want to delete this task?</p>
                </div>
                <div class="modal-footer">
                    <button id="cancelDelete" type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button id="confirmDelete" type="button" class="btn btn-danger">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="/js/dashboard.js"></script>
</body>
</html>
